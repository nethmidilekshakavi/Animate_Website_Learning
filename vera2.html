<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VERA — Skin Nourish</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root { --cream: #f5f0e8; --dark: #1a1a18; --green: #2d5a3d; }

    body { background: var(--cream); color: var(--dark); font-family: 'Jost', sans-serif; overflow-x: hidden; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.5rem 3rem;
    }
    nav .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; letter-spacing: 0.3em; color: var(--dark); }
    nav ul { list-style: none; display: flex; gap: 2.5rem; }
    nav ul a { text-decoration: none; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dark); opacity: 0.7; transition: opacity 0.3s; }
    nav ul a:hover { opacity: 1; }

    .scroll-container { height: 400vh; position: relative; }

    .sticky-scene {
      position: sticky; top: 0; height: 100vh; width: 100%;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
    }

    .hero-word {
      position: absolute;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(6rem, 17vw, 15rem);
      font-weight: 300; color: rgba(45,90,61,0.07);
      user-select: none; pointer-events: none; white-space: nowrap;
      top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1;
    }

    .brand-center {
      position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
      text-align: center; z-index: 10; opacity: 0;
    }
    .brand-center h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.5rem, 4vw, 3rem); font-weight: 300; letter-spacing: 0.4em; color: var(--dark); }
    .brand-center span { display: block; font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--green); margin-top: 0.4rem; opacity: 0.7; }

    .aloe-wrap {
      position: absolute; bottom: -5%; left: 50%; transform: translateX(-50%);
      width: min(90vw, 800px); z-index: 2;
    }
    .aloe-wrap img { width: 100%; height: auto; display: block; }

    /* JAR SCENE — two totally separate images stacked */
    .jar-scene {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: min(50vw, 320px);
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* LID image — comes from TOP, positioned above jar body */
    .jar-lid {
      width: 100%;
      transform: translateY(-300px);
      opacity: 0;
      display: block;
      line-height: 0;
      /* Lid image is wide/flat so keep natural aspect */
    }
    .jar-lid img {
      width: 100%;
      display: block;
    }

    /* JAR BODY — comes from BOTTOM */
    .jar-body {
      width: 100%;
      transform: translateY(300px);
      opacity: 0;
      display: block;
      line-height: 0;
      margin-top: -2px; /* seamless join */
    }
    .jar-body img {
      width: 100%;
      display: block;
    }

    .tagline {
      position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
      text-align: center; z-index: 10; opacity: 0; pointer-events: none;
    }
    .tagline p { font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--green); opacity: 0.8; }

    .section-2 { min-height: 100vh; background: var(--dark); display: flex; align-items: center; justify-content: center; padding: 6rem 3rem; }
    .section-2-inner { max-width: 900px; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
    .section-2 h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 4rem); font-weight: 300; color: #f5f0e8; line-height: 1.1; }
    .section-2 .desc { color: rgba(245,240,232,0.6); font-size: 0.9rem; line-height: 1.8; letter-spacing: 0.05em; }
    .section-2 .desc p { margin-bottom: 0.6rem; }

    @media (max-width: 600px) {
      nav { padding: 1.2rem 1.5rem; }
      nav ul { gap: 1.2rem; }
      .section-2-inner { grid-template-columns: 1fr; gap: 2rem; }
      .jar-scene { width: min(75vw, 260px); }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">VERA</div>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Shop</a></li>
    <li><a href="#">About Us</a></li>
    <li><a href="#">Blog</a></li>
  </ul>
</nav>

<div class="scroll-container" id="scrollContainer">
  <div class="sticky-scene">

    <div class="hero-word" id="heroWord">NOURISH</div>

    <div class="brand-center" id="brandCenter">
      <h1>VERA</h1>
      <span>Skin Nourish</span>
    </div>

    <div class="aloe-wrap" id="aloeWrap">
      <img src="images/b5c222a4-e90f-4ea7-87f4-fa47f6d90c22-removebg-preview%201.png" alt="Aloe vera" />
    </div>

    <div class="jar-scene" id="jarScene">
      <!-- Lid.png — separate lid, comes DOWN from top -->
      <div class="jar-lid" id="jarLid">
        <img src="images/Lid.png" alt="Lid" />
      </div>
      <!-- Jar.png — jar body only, comes UP from bottom -->
      <div class="jar-body" id="jarBody">
        <img src="images/Jar.png" alt="Jar" />
      </div>
    </div>

    <div class="tagline" id="tagline">
      <p>Glow Every Day</p>
    </div>

  </div>
</div>

<div class="section-2">
  <div class="section-2-inner">
    <div><h2>Deeply Nourished.<br>Every Day.</h2></div>
    <div class="desc">
      <p>Deeply hydrates</p>
      <p>Nourishes &amp; repairs</p>
      <p>Strengthens skin barrier</p>
      <p>Non-greasy formula</p>
      <br>
      <p style="letter-spacing:0.2em;font-size:0.75rem;text-transform:uppercase;color:#6a9b7a;">All Skin Types</p>
    </div>
  </div>
</div>

<script>
  const aloeWrap    = document.getElementById('aloeWrap');
  const jarLid      = document.getElementById('jarLid');
  const jarBody     = document.getElementById('jarBody');
  const tagline     = document.getElementById('tagline');
  const brandCenter = document.getElementById('brandCenter');
  const heroWord    = document.getElementById('heroWord');
  const jarScene    = document.getElementById('jarScene');
  const scrollContainer = document.getElementById('scrollContainer');

  function clamp(v,a,b){ return Math.min(Math.max(v,a),b); }
  function ease(t){ return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }
  function lerp(a,b,t){ return a+(b-a)*t; }

  window.addEventListener('scroll', () => {
    const total = scrollContainer.offsetHeight - window.innerHeight;
    const p = clamp(window.scrollY / total, 0, 1);

    // Phase 1 (0→0.3): aloe exits up, brand appears
    const p1 = ease(clamp(p / 0.3, 0, 1));
    aloeWrap.style.transform = `translateX(-50%) translateY(${lerp(0, -130, p1)}%)`;
    aloeWrap.style.opacity   = 1 - p1;
    heroWord.style.opacity   = lerp(0.07, 0, p1);
    brandCenter.style.opacity = p1;

    // Phase 2 (0.3→0.68): Lid udin enwa, Jar yatinwa enwa
    const p2 = ease(clamp((p - 0.3) / 0.38, 0, 1));
    jarLid.style.transform  = `translateY(${lerp(-300, 0, p2)}px)`;
    jarBody.style.transform = `translateY(${lerp(300, 0, p2)}px)`;
    jarLid.style.opacity    = clamp(p2 * 2.5, 0, 1);
    jarBody.style.opacity   = clamp(p2 * 2.5, 0, 1);

    // Phase 3 (0.72→0.87): full jar pitipasset yanwa, tagline fadein
    const p3 = ease(clamp((p - 0.72) / 0.15, 0, 1));
    const scale = lerp(1, 0.65, p3);
    const moveY = lerp(0, 40, p3);
    jarScene.style.transform = `translate(-50%, calc(-50% + ${moveY}px)) scale(${scale})`;

    tagline.style.opacity = p3;
  });
</script>
</body>
</html>
